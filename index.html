<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Stratégie de Bascule — Guide pas à pas du pilotage stratégique LSD Agents">
  <meta name="color-scheme" content="dark light">
  <title>Stratégie de Bascule — Édition Premium</title>

  <!-- CDN Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@3.5.3/tsparticles.bundle.min.js" integrity="sha256-" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" integrity="sha256-" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js" integrity="sha256-" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/split-type@0.3.4/umd/index.min.js" integrity="sha256-" crossorigin="anonymous"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Particle background -->
  <div id="particles" class="particles-bg"></div>

  <!-- Floating orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Grid overlay -->
  <div class="grid-overlay"></div>

  <!-- Topbar -->
  <header class="topbar glass-nav">
    <div class="topbar-brand">
      <span class="topbar-logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7v6c0 5.5 3.8 10.7 10 12 6.2-1.3 10-6.5 10-12V7L12 2z" stroke="currentColor" stroke-width="1.5"/></svg>
      </span>
      <span class="topbar-title">Stratégie de Bascule</span>
    </div>
    <div class="topbar-actions">
      <span class="progress-badge" id="progressBadge">0/6</span>
      <button id="themeToggle" class="theme-toggle" aria-label="Changer le thème">🌙</button>
      <button id="resetBtn" class="btn-glass-sm" aria-label="Réinitialiser">↺</button>
    </div>
  </header>

  <!-- Stepper -->
  <nav class="stepper glass-nav" role="navigation" aria-label="Étapes du guide">
    <button class="step" data-step="0" aria-current="true">
      <span class="step-ring"><span class="step-dot"></span></span>
      <span class="step-label">Diagnostic</span>
    </button>
    <div class="step-line"><div class="step-line-fill"></div></div>
    <button class="step" data-step="1" disabled>
      <span class="step-ring"><span class="step-dot"></span></span>
      <span class="step-label">Écosystème</span>
    </button>
    <div class="step-line"><div class="step-line-fill"></div></div>
    <button class="step" data-step="2" disabled>
      <span class="step-ring"><span class="step-dot"></span></span>
      <span class="step-label">La Bascule</span>
    </button>
    <div class="step-line"><div class="step-line-fill"></div></div>
    <button class="step" data-step="3" disabled>
      <span class="step-ring"><span class="step-dot"></span></span>
      <span class="step-label">Roadmap</span>
    </button>
    <div class="step-line"><div class="step-line-fill"></div></div>
    <button class="step" data-step="4" disabled>
      <span class="step-ring"><span class="step-dot"></span></span>
      <span class="step-label">Métriques</span>
    </button>
    <div class="step-line"><div class="step-line-fill"></div></div>
    <button class="step" data-step="5" disabled>
      <span class="step-ring"><span class="step-dot"></span></span>
      <span class="step-label">Plan d'action</span>
    </button>
  </nav>

  <!-- Main content -->
  <main id="stepContent" class="step-content">
    <!-- Rendu dynamique -->
  </main>

  <!-- Footer nav -->
  <footer class="step-footer glass-nav">
    <button id="prevBtn" class="btn-nav" disabled>← Précédent</button>
    <div class="step-indicator">
      <span id="stepDots"></span>
    </div>
    <button id="nextBtn" class="btn-nav btn-primary">Suivant →</button>
  </footer>

  <!-- Toast notifications -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <!-- Celebration canvas -->
  <canvas id="confetti" class="confetti-canvas"></canvas>

  <script src="app.js"></script>
</body>
</html>
